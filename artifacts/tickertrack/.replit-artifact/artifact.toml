kind = "web"
previewPath = "/"
title = "Stock Screener"
version = "1.0.0"
id = "artifacts/tickertrack"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25298

[services.development]
run = "pnpm --filter @workspace/tickertrack run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tickertrack", "run", "build" ]
publicDir = "artifacts/tickertrack/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25298"
BASE_PATH = "/"
