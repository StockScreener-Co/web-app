name: Deploy to GitHub Pages

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        # Добавили флаг, чтобы не было ошибки lockfile
        run: pnpm install --no-frozen-lockfile
      - name: Build web app
        run: |
          pnpm build
          echo "Проверка содержимого папки после сборки:"
          ls -R dist || echo "ПАПКА DIST НЕ СОЗДАНА!"
        env:
          BASE_PATH: /${{ github.event.repository.name }}/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist' # Теперь ищем просто в dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4