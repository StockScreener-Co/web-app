openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /v1/portfolios:
    get:
      operationId: getPortfolios
      tags: [portfolios]
      summary: Get portfolios
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioDto"
    post:
      operationId: createPortfolio
      tags: [portfolios]
      summary: Create portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PortfolioRequestDto"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioDto"
  /v1/portfolios/my:
    get:
      operationId: getMyPortfolios
      tags: [portfolios]
      summary: Get my portfolios
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioDto"
  /v1/portfolios/{id}:
    get:
      operationId: getPortfolioById
      tags: [portfolios]
      summary: Get portfolio by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioDetailsDto"
    delete:
      operationId: deletePortfolio
      tags: [portfolios]
      summary: Delete portfolio
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No content
  /v1/stock-popularity/most-popular:
    get:
      operationId: getMostPopularStocks
      tags: [stocks]
      summary: Get most popular stocks
      description: Returns a list of the most popular stocks
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstrumentMostPopularDto"
  /v1/transactions/portfolio/{portfolioId}:
    get:
      operationId: getTransactionsForPortfolio
      tags: [transactions]
      summary: List all transactions for a portfolio
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TransactionResponseDto"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create transaction for portfolio
      parameters:
        - name: portfolioId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequestDto"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponseDto"
  /v1/transactions/{transactionId}:
    patch:
      operationId: updateTransaction
      tags: [transactions]
      summary: Edit a transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransactionRequestDto"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionResponseDto"
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: transactionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: No content
  /v1/instruments/{instrumentId}/profile:
    get:
      operationId: getInstrumentProfile
      tags: [instruments]
      summary: Get company profile for an instrument
      parameters:
        - name: instrumentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyProfileDto"
  /v1/instruments/search:
    get:
      operationId: searchInstruments
      tags: [instruments]
      summary: Search instruments
      parameters:
        - name: query
          in: query
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InstrumentDto"
  /v1/instruments/{instrumentId}:
    get:
      operationId: getInstrumentById
      tags: [instruments]
      summary: Get instrument page view
      parameters:
        - name: instrumentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstrumentPageViewDto"
  /v1/news/instrument/{instrumentId}:
    get:
      operationId: getNewsForInstrument
      tags: [news]
      summary: Get latest news for instrument
      parameters:
        - name: instrumentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsDto"
  /v1/prices/price-chart/instrument/{instrumentId}:
    get:
      operationId: getPriceChartForInstrument
      tags: [prices]
      summary: Get price chart for instrument
      parameters:
        - name: instrumentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          schema:
            $ref: "#/components/schemas/ChartPeriod"
      responses:
        "200":
          description: Successful response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistoryChartResponseDto"
components:
  schemas:
    OperationType:
      type: string
      enum: [BUY, SELL, DIVIDEND, DEPOSIT, WITHDRAWAL]
    TransactionRequestDto:
      type: object
      properties:
        instrumentId:
          type: string
          format: uuid
        tradeDate:
          type: string
          format: date
        price:
          type: number
        operationType:
          $ref: "#/components/schemas/OperationType"
        quantity:
          type: number
      required:
        - instrumentId
        - tradeDate
        - price
        - operationType
        - quantity
    TransactionResponseDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        instrumentId:
          type: string
          format: uuid
        quantity:
          type: number
        price:
          type: number
        tradeDate:
          type: string
          format: date
        operationType:
          $ref: "#/components/schemas/OperationType"
        symbol:
          type: string
      required:
        - id
        - instrumentId
        - quantity
        - price
        - tradeDate
        - operationType
        - symbol
    InstrumentDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        symbol:
          type: string
        name:
          type: string
        type:
          type: string
        currency:
          type: string
      required:
        - id
        - symbol
        - name
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    PortfolioDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
        - id
        - name
    PortfolioDetailsDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        assets:
          type: array
          items:
            $ref: "#/components/schemas/AssetDto"
      required:
        - id
        - name
        - assets
    AssetDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        instrumentId:
          type: string
          format: uuid
        symbol:
          type: string
        name:
          type: string
        qty:
          type: number
        avgPrice:
          type: number
        weight:
          type: number
        value:
          type: number
        currentPrice:
          type: number
        unrealizedPL:
          $ref: "#/components/schemas/MetricCard"
        todayChange:
          $ref: "#/components/schemas/MetricCard"
      required:
        - id
        - instrumentId
        - symbol
        - name
        - qty
        - avgPrice
        - weight
        - value
        - currentPrice
        - unrealizedPL
        - todayChange
    PortfolioRequestDto:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
      required:
        - name
    InstrumentMostPopularDto:
      type: object
      properties:
        name:
          type: string
        price:
          $ref: "#/components/schemas/CurrentPriceResponseDto"
        isDataComplete:
          type: boolean
      required:
        - name
        - price
        - isDataComplete
    CurrentPriceResponseDto:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
        currency:
          type: string
        todayChange:
          $ref: "#/components/schemas/MetricCardOld"
      required:
        - symbol
        - price
        - currency
        - todayChange
    MetricCard:
      type: object
      properties:
        value:
          type: number
        ratio:
          type: number
        trend:
          type: string
          enum: [UP, DOWN, FLAT]
      required:
        - value
        - ratio
        - trend
    CompanyProfileDto:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        sector:
          type: string
        industry:
          type: string
        type:
          type: string
        country:
          type: string
        state:
          type: string
        city:
          type: string
        zip:
          type: string
        address:
          type: string
        address2:
          type: string
        phone:
          type: string
        website:
          type: string
        exchange:
          type: string
        micCode:
          type: string
        ceo:
          type: string
        employees:
          type: integer
        description:
          type: string
    MetricCardOld:
      type: object
      properties:
        label:
          type: string
        value:
          type: string
        change:
          type: string
        isPositive:
          type: boolean
      required:
        - value
    InstrumentCurrentPriceDto:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
        currency:
          type: string
        todayChange:
          $ref: "#/components/schemas/MetricCard"
    InstrumentPageViewDto:
      type: object
      properties:
        instrumentId:
          type: string
          format: uuid
        companyName:
          type: string
        currPrice:
          $ref: "#/components/schemas/InstrumentCurrentPriceDto"
        keyStats:
          type: object
          properties:
            marketCap:
              type: number
            peRatio:
              type: number
            peTtmRatio:
              type: number
            epsTtm:
              type: number
            high52W:
              type: number
            low52W:
              type: number
            volume:
              type: number
            dividendYield:
              type: number
            beta:
              type: number
            revenueTtm:
              type: number
            netIncomeTtm:
              type: number
        profile:
          type: object
          properties:
            name:
              type: string
            details:
              type: object
              properties:
                description:
                  type: string
    NewsDto:
      type: object
      properties:
        id:
          type: string
        datetime:
          type: string
        headline:
          type: string
        source:
          type: string
        url:
          type: string
        image:
          type: string
      required:
        - id
        - headline
        - source
        - url
    PriceHistoryChartResponseDto:
      type: object
      properties:
        symbol:
          type: string
        currency:
          type: string
        period:
          $ref: "#/components/schemas/ChartPeriod"
        interval:
          $ref: "#/components/schemas/ChartInterval"
        points:
          type: array
          items:
            $ref: "#/components/schemas/ChartPointDto"
    ChartPeriod:
      type: string
      enum: [ONE_DAY, FIVE_DAYS, ONE_MONTH, THREE_MONTHS, SIX_MONTHS, YTD, ONE_YEAR, FIVE_YEARS, ALL]
    ChartInterval:
      type: string
      enum: [ONE_MINUTE, TEN_MINUTES, ONE_DAY, ONE_WEEK]
    ChartPointDto:
      type: object
      properties:
        timestamp:
          type: string
        price:
          type: number
      required:
        - timestamp
        - price

